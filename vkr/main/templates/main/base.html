<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>{% block title %} {% endblock %}</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.3/font/bootstrap-icons.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css"
    />
  </head>
  <body>
    <link rel="stylesheet" href="/static/style.css" />
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <nav
      class="navbar navbar-light py-2 border-bottom"
      style="background-color: rgb(61, 58, 63)"
    >
      <div class="container d-flex flex-wrap">
        <ul class="nav me-auto">
          <li class="nav-item btn btn-light p-0 m-1">
            <a
              href="/"
              class="nav-link link-dark px-2 active"
              aria-current="page"
              >Главная</a
            >
          </li>
          <li class="nav-item btn btn-light p-0 m-1">
            <a href="/menu/" class="nav-link link-dark px-2">Меню</a>
          </li>
          <li class="nav-item btn btn-light p-0 m-1">
            <a href="/restaurants" class="nav-link link-dark px-2">Рестораны</a>
          </li>
          <li class="nav-item btn btn-light p-0 m-1">
            <a href="/about" class="nav-link link-dark px-2">О нас</a>
          </li>
        </ul>
        <ul class="nav">
          {% if user.is_authenticated %}
          <li class="nav-item btn btn-light p-0 m-1">
            <a href="/dish_create" class="nav-link link-dark px-2"
              >Добавить блюдо</a
            >
          </li>
          <li class="nav-item btn btn-light p-0 m-1">
            <a href="/accounts/profile" class="nav-link link-dark px-2"
              >{{user.username}}</a
            >
          </li>
          <li class="nav-item btn btn-light p-0 m-1">
            <a href="{% url 'logout' %}" class="nav-link link-dark px-2"
              >Выйти</a
            >
          </li>
          {% else %}
          <li class="nav-item btn btn-light p-0 m-1">
            <a href="/accounts/login" class="nav-link link-dark px-2">Войти</a>
          </li>
          <li class="nav-item btn btn-light p-0 m-1">
            <a href="/accounts/registration" class="nav-link link-dark px-2"
              >Зарегистрироваться</a
            >
          </li>
          {% endif %} {% if user.is_staff %}
          <li class="nav-item btn btn-danger p-0 m-1">
            <a href="/admin" class="nav-link link-dark px-2">Админ</a>
          </li>
          {% endif %}
        </ul>
      </div>
    </nav>
    <div class="container p-4">
        {% block content %}
        {% endblock %}
    </div>
  </body>
</html>
