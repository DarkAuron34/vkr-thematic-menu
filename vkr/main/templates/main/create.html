{% extends  'main/base.html' %}

{% block title  %}
{{title}}
{% endblock  %}

{% block content  %}
    <h1>Создать рецепт</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.title }}<br>
        {{ form.price }}<br>
        {{ form.difficulty }}<br>
        {{ form.national_cuisine }}<br>
        {{ form.cooking_time }}<br>
        {{ form.description}}<br>

        <button type="submit" class="btn btn-success">Добавить</button>
        <span>{{ error }}</span>
    </form>

{% endblock %}
